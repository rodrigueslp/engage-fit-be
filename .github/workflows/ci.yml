name: Backend CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: boxengage_test
          POSTGRES_USER: boxengage
          POSTGRES_PASSWORD: boxengage
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U boxengage -d boxengage_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://boxengage:boxengage@localhost:5432/boxengage_test?sslmode=disable
      TEST_DATABASE_URL: postgres://boxengage:boxengage@localhost:5432/boxengage_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: Verify modules
        run: go mod verify
      - name: Verify formatting
        run: test -z "$(gofmt -l $(find . -name '*.go' -not -path './vendor/*'))"
      - name: Vet
        run: go vet ./...
      - name: Apply migrations on fresh PostgreSQL
        run: go run ./cmd/migrate up
      - name: Verify migration idempotency
        run: |
          test "$(go run ./cmd/migrate up)" = "migration complete: 0 applied"
      - name: Test with race detector and PostgreSQL integration
        run: go test -race -count=1 ./...
      - name: API smoke test
        env:
          APP_ENV: development
          HTTP_PORT: "18080"
          OWNER_SETUP_ENABLED: "true"
          PROMETHEUS_ENABLED: "false"
          JWT_SECRET: ci-smoke-secret-not-used-in-production
        run: |
          go run ./cmd/api > api-smoke.log 2>&1 &
          API_PID=$!
          trap 'kill "$API_PID" 2>/dev/null || true; cat api-smoke.log' EXIT
          for attempt in $(seq 1 90); do
            curl --fail --silent http://127.0.0.1:18080/health/ready && break
            if ! kill -0 "$API_PID" 2>/dev/null; then
              echo "API process exited before becoming ready"
              exit 1
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:18080/health/ready
          API_BASE_URL=http://127.0.0.1:18080 node scripts/smoke-api.mjs
      - name: Build release binaries
        run: |
          go build ./cmd/api
          go build ./cmd/migrate
          go build ./cmd/rotate-secrets
          go build ./cmd/privacy-retention
      - name: Validate operational scripts
        run: |
          node --check scripts/demo-seed.mjs
          node --check scripts/daily-automation.mjs
          node --check scripts/smoke-api.mjs
