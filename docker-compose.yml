services:
  postgres:
    image: postgres:16-alpine
    container_name: boxengage-postgres
    environment:
      POSTGRES_DB: boxengage
      POSTGRES_USER: boxengage
      POSTGRES_PASSWORD: boxengage
    ports:
      - "5432:5432"
    volumes:
      - boxengage-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boxengage -d boxengage"]
      interval: 5s
      timeout: 5s
      retries: 10

